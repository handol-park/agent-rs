name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# #1: a new push to the PR cancels the in-flight review instead of stacking.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # #2: skip draft PRs (don't pay to review WIP).
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    # #2: cap a runaway agent job (default would be 6h).
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
      issues: read
      actions: read # #3: let the reviewer read CI results.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@806af32823ef69c8ef357086c573a902af641307 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # #3: surface CI results to the reviewer.
          additional_permissions: |
            actions: read
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*),Bash(gh api:*),Task,Read,Grep,Glob,TodoWrite"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
